<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Extraction Relationship Graph</title>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #12141a;
      --panel: #1a1d26;
      --border: #2a3040;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #5b9fd4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-wrap: wrap;
    }

    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .file-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #242836;
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
    }

    .file-btn:hover { border-color: var(--accent); color: var(--accent); }

    .file-btn input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    #filename {
      color: var(--muted);
      font-size: 0.85rem;
      flex: 1;
      min-width: 8rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #status {
      font-size: 0.8rem;
      color: var(--muted);
    }

    #status.error { color: #e07070; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: 0;
    }

    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; grid-template-rows: 55vh 1fr; }
    }

    .graph-wrap {
      position: relative;
      min-height: 0;
      border-right: 1px solid var(--border);
    }

    #graph {
      position: absolute;
      inset: 0;
      background: #0e1015;
    }

    .floating-legend {
      position: absolute;
      left: 0.75rem;
      bottom: 0.75rem;
      z-index: 5;
      max-width: 220px;
      max-height: 40%;
      overflow-y: auto;
      padding: 0.75rem 0.9rem;
      background: rgba(26, 29, 38, 0.92);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      font-size: 0.85rem;
    }

    .floating-legend h2 {
      margin: 0 0 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    .floating-legend h2:not(:first-child) {
      margin-top: 0.75rem;
    }

    #graph.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      padding: 2rem;
    }

    aside {
      overflow-y: auto;
      padding: 1rem;
      background: var(--panel);
      font-size: 0.85rem;
    }

    aside h2 {
      margin: 0 0 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    aside section {
      margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    aside section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #selection .label {
      color: var(--muted);
      font-size: 0.75rem;
    }

    #selection .name {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0.15rem 0 0.5rem;
    }

    #selection .tag {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 0.75rem;
    }

    #selection ul {
      margin: 0.35rem 0 0;
      padding-left: 1.1rem;
      color: var(--muted);
    }

    #selection li { margin: 0.25rem 0; }

    .placeholder { color: var(--muted); font-style: italic; }

    .file-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .file-item:last-child { border-bottom: none; }

    .file-item-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .file-item.issue .file-item-label { color: #e07070; }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }

    .links-dot { background: #c5cad6; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.2rem;
    }

    .remove-btn:hover { color: #e07070; }

    .clear-btn {
      margin-top: 0.5rem;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #242836;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    .file-notes {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .file-notes div { padding: 0.2rem 0; }

    .doc-tag {
      display: inline-block;
      padding: 0.05rem 0.35rem;
      border-radius: 3px;
      font-size: 0.65rem;
      color: #12141a;
      font-weight: 600;
      margin-right: 0.3rem;
    }

    .page-tag {
      color: var(--muted);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Relationship graph</h1>
    <label class="file-btn">
      Load JSON…
      <input type="file" id="fileInput" accept=".json,application/json" multiple />
    </label>
    <span id="filename">Choose files from output/, plus optionally output/cross_document_links.json</span>
    <span id="status"></span>
  </header>

  <main>
    <div class="graph-wrap">
      <div id="graph" class="empty">
        Drop an extraction JSON here, or use Load JSON…
      </div>
      <div class="floating-legend">
        <h2>Legend</h2>
        <div class="legend" id="legend"></div>
      </div>
    </div>
    <aside>
      <section>
        <h2>Loaded files</h2>
        <ul id="fileList" class="file-list"><li class="placeholder">No files loaded</li></ul>
        <div id="fileNotes" class="file-notes" hidden></div>
        <button id="clearAllBtn" class="clear-btn" hidden>Clear all</button>
      </section>
      <section>
        <h2>Selected node</h2>
        <div id="selection" class="placeholder">Click a node in the graph</div>
      </section>
    </aside>
  </main>

  <script>
    const TYPE_COLORS = {
      PERSON: "#5b9fd4",
      ORGANIZATION: "#6bbf8a",
      LOCATION: "#e0b45a",
      PRODUCT: "#c27bdb",
      EVENT: "#e07a5f",
      OTHER: "#8b93a7",
    };

    const DOC_COLORS = ["#ff6b6b", "#4ecdc4", "#ffd93d", "#a78bfa", "#38bdf8", "#fb923c", "#34d399", "#f472b6"];
    let usedColorSlots = new Array(DOC_COLORS.length).fill(false);

    let network = null;

    let loadedDocs = new Map();       // docId -> {fileName, data, color, colorSlot}
    let linksData = null;
    let linksFileName = null;
    let fileIssues = [];              // [{fileName, message}]
    let loadNotices = [];             // transient messages from the last load batch

    let resolvedGroups = new Map();   // groupId -> group
    let memberIndex = new Map();      // "docId::localName" -> groupId
    let unresolvedGroups = [];        // [{group, missing:[docId,...]}]
    let linksNoOverlap = false;

    let nodeMeta = {};
    let resolvedEdges = [];

    const graphEl = document.getElementById("graph");
    const fileInput = document.getElementById("fileInput");
    const filenameEl = document.getElementById("filename");
    const statusEl = document.getElementById("status");
    const selectionEl = document.getElementById("selection");
    const legendEl = document.getElementById("legend");
    const fileListEl = document.getElementById("fileList");
    const fileNotesEl = document.getElementById("fileNotes");
    const clearAllBtn = document.getElementById("clearAllBtn");

    function buildLegend() {
      legendEl.innerHTML = "";
      for (const [type, color] of Object.entries(TYPE_COLORS)) {
        const row = document.createElement("div");
        row.className = "legend-item";
        row.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${type}`;
        legendEl.appendChild(row);
      }
    }

    function setStatus(msg, isError) {
      statusEl.textContent = msg || "";
      statusEl.classList.toggle("error", !!isError);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalizeMentionForm(s) {
      return (s || "").normalize("NFC").trim().replace(/\s+/g, " ").toLowerCase();
    }

    function deriveDocId(fileName) {
      return fileName.replace(/\.json$/i, "");
    }

    function classifyFile(data) {
      if (data && typeof data === "object" && data.error) return "error-json";
      if (data && typeof data === "object" && data.document && Array.isArray(data.entities)) return "extraction";
      if (
        data && typeof data === "object" &&
        Array.isArray(data.groups) && Array.isArray(data.documents) && Array.isArray(data.ambiguous_local_matches)
      ) return "links";
      return "unknown";
    }

    function assignDocColor() {
      let idx = usedColorSlots.findIndex((used) => !used);
      if (idx === -1) {
        return { color: DOC_COLORS[loadedDocs.size % DOC_COLORS.length], slot: null };
      }
      usedColorSlots[idx] = true;
      return { color: DOC_COLORS[idx], slot: idx };
    }

    function freeDocColor(slot) {
      if (slot != null && slot < usedColorSlots.length) usedColorSlots[slot] = false;
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error("could not read file"));
        reader.readAsText(file);
      });
    }

    function ingestExtraction(fileName, data, notices) {
      const docId = deriveDocId(fileName);
      if (loadedDocs.has(docId)) {
        const existing = loadedDocs.get(docId);
        loadedDocs.set(docId, { fileName, data, color: existing.color, colorSlot: existing.colorSlot });
        notices.push(`Replaced previously loaded '${docId}' with '${fileName}'.`);
      } else {
        const { color, slot } = assignDocColor();
        loadedDocs.set(docId, { fileName, data, color, colorSlot: slot });
      }
    }

    function ingestLinks(fileName, data, notices) {
      if (linksData) {
        notices.push(`A links file is already loaded ('${linksFileName}'); remove it before loading another.`);
        return;
      }
      linksData = data;
      linksFileName = fileName;
    }

    async function handleFiles(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length) return;

      const notices = [];
      for (const file of files) {
        let text;
        try {
          text = await readFileAsText(file);
        } catch (e) {
          fileIssues.push({ fileName: file.name, message: `Could not read file (${e.message || e})` });
          continue;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          fileIssues.push({ fileName: file.name, message: `Invalid JSON: ${e.message}` });
          continue;
        }

        const kind = classifyFile(data);
        if (kind === "extraction") {
          ingestExtraction(file.name, data, notices);
        } else if (kind === "links") {
          ingestLinks(file.name, data, notices);
        } else if (kind === "error-json") {
          fileIssues.push({ fileName: file.name, message: "This looks like an .error.json file (extraction failed)" });
        } else {
          fileIssues.push({ fileName: file.name, message: "Unrecognized JSON shape" });
        }
      }

      loadNotices = notices;
      refresh();
    }

    function removeDoc(docId) {
      const entry = loadedDocs.get(docId);
      if (entry) freeDocColor(entry.colorSlot);
      loadedDocs.delete(docId);
      loadNotices = [];
      refresh();
    }

    function removeLinks() {
      linksData = null;
      linksFileName = null;
      loadNotices = [];
      refresh();
    }

    function removeIssue(index) {
      fileIssues.splice(index, 1);
      refresh();
    }

    function clearAll() {
      loadedDocs.clear();
      usedColorSlots.fill(false);
      linksData = null;
      linksFileName = null;
      fileIssues = [];
      loadNotices = [];
      refresh();
    }

    function recomputeGroups() {
      resolvedGroups = new Map();
      memberIndex = new Map();
      unresolvedGroups = [];
      linksNoOverlap = false;

      if (!linksData) return;

      for (const g of linksData.groups || []) {
        const memberDocs = g.documents || [];
        const present = memberDocs.filter((d) => loadedDocs.has(d));
        if (memberDocs.length > 0 && present.length === memberDocs.length) {
          resolvedGroups.set(g.id, g);
          for (const m of g.members || []) {
            memberIndex.set(m.document + "::" + m.local_name, g.id);
          }
        } else if (present.length > 0) {
          unresolvedGroups.push({ group: g, missing: memberDocs.filter((d) => !loadedDocs.has(d)) });
        }
      }

      if (loadedDocs.size > 0 && (linksData.documents || []).length > 0) {
        linksNoOverlap = !(linksData.documents || []).some((d) => loadedDocs.has(d.id));
      }
    }

    function nodeIdFor(docId, entityName) {
      const groupId = memberIndex.get(docId + "::" + entityName);
      return groupId ? "group:" + groupId : "doc:" + docId + "::" + entityName;
    }

    function buildGraph() {
      nodeMeta = {};
      resolvedEdges = [];
      const degree = {};

      function ensureNode(nodeId, docId, localName, type) {
        if (!nodeMeta[nodeId]) {
          nodeMeta[nodeId] = {
            name: localName,
            type: type || "OTHER",
            mentions: [],
            fromEntity: false,
            isGroup: nodeId.startsWith("group:"),
            members: [],
          };
        }
        degree[nodeId] = degree[nodeId] || 0;
        const meta = nodeMeta[nodeId];
        if (!meta.members.some((m) => m.docId === docId && m.localName === localName)) {
          meta.members.push({ docId, localName, localType: type || "OTHER", localMentions: [] });
        }
        return meta;
      }

      for (const [docId, doc] of loadedDocs) {
        for (const e of doc.data.entities || []) {
          if (!e || !e.name) continue;
          const nodeId = nodeIdFor(docId, e.name);
          const meta = ensureNode(nodeId, docId, e.name, e.type || "OTHER");
          meta.fromEntity = true;

          const group = meta.isGroup ? resolvedGroups.get(nodeId.slice(6)) : null;
          meta.name = group ? group.representative_name : e.name;
          meta.type = group ? group.representative_type : (e.type || "OTHER");

          const newMentions = e.mentions || [];
          for (const m of newMentions) {
            if (!m) continue;
            const text = typeof m === "string" ? m : m.text;
            const page = typeof m === "string" ? null : (m.page ?? null);
            if (!text) continue;
            const norm = normalizeMentionForm(text);
            if (!norm) continue;
            let entry = meta.mentions.find((existing) => normalizeMentionForm(existing.text) === norm);
            if (!entry) {
              entry = { text, pages: [] };
              meta.mentions.push(entry);
            }
            if (page !== null && page !== undefined && !entry.pages.includes(page)) {
              entry.pages.push(page);
              entry.pages.sort((a, b) => a - b);
            }
          }

          const member = meta.members.find((m) => m.docId === docId && m.localName === e.name);
          if (member) {
            member.localType = e.type || "OTHER";
            member.localMentions = newMentions;
          }
        }
      }

      let edgeIndex = 0;
      for (const [docId, doc] of loadedDocs) {
        for (const r of doc.data.relationships || []) {
          if (!r) continue;
          const fromId = r.subject ? nodeIdFor(docId, r.subject) : null;
          const toId = r.object ? nodeIdFor(docId, r.object) : null;
          if (fromId) {
            ensureNode(fromId, docId, r.subject, "OTHER");
            degree[fromId] = (degree[fromId] || 0) + 1;
          }
          if (toId) {
            ensureNode(toId, docId, r.object, "OTHER");
            degree[toId] = (degree[toId] || 0) + 1;
          }
          if (fromId && toId) {
            resolvedEdges.push({
              edgeId: `e${edgeIndex++}`,
              fromId,
              toId,
              relation: r.relation,
              context: r.context,
              page: r.page,
              docId,
            });
          }
        }
      }

      const multiDoc = loadedDocs.size > 1;

      const nodes = Object.keys(nodeMeta).map((id) => {
        const meta = nodeMeta[id];
        const deg = degree[id] || 0;
        const size = 14 + Math.min(deg, 8) * 3;
        const fillColor = TYPE_COLORS[meta.type] || TYPE_COLORS.OTHER;
        const label = meta.name.length > 36 ? meta.name.slice(0, 34) + "…" : meta.name;

        let borderColor = "#9aa3b5";
        let borderWidth = 2;
        if (multiDoc) {
          if (meta.isGroup) {
            borderColor = "#ffffff";
            borderWidth = 3;
          } else if (meta.members.length) {
            const ownerDoc = loadedDocs.get(meta.members[0].docId);
            if (ownerDoc) borderColor = ownerDoc.color;
          }
        }

        let title = `${meta.name}\n${meta.type}${deg ? `\n${deg} connection(s)` : ""}`;
        if (multiDoc && meta.isGroup) {
          const docIds = [...new Set(meta.members.map((m) => m.docId))];
          title += `\nAppears in: ${docIds.join(", ")}`;
        }

        return {
          id,
          label,
          title,
          color: {
            background: fillColor,
            border: borderColor,
            highlight: { background: fillColor, border: "#ffffff" },
            hover: { background: fillColor, border: "#ffffff" },
          },
          font: {
            color: "#ffffff",
            size: 12,
            face: "Segoe UI",
            strokeWidth: 1,
            strokeColor: "#6b7280",
          },
          size,
          shape: "dot",
          borderWidth,
        };
      });

      const pairBuckets = new Map();
      resolvedEdges.forEach((r, i) => {
        const key =
          r.fromId < r.toId
            ? `${r.fromId}::${r.toId}`
            : `${r.toId}::${r.fromId}`;
        if (!pairBuckets.has(key)) pairBuckets.set(key, []);
        pairBuckets.get(key).push({ r, i });
      });

      const edges = [];
      for (const items of pairBuckets.values()) {
        const n = items.length;
        items.forEach(({ r }, idx) => {
          let smooth;
          if (n === 1) {
            smooth = { enabled: true, type: "dynamic" };
          } else {
            const mid = (n - 1) / 2;
            const offset = idx - mid;
            const roundness = 0.18 + Math.abs(offset) * 0.22;
            smooth = {
              enabled: true,
              type: offset < 0 ? "curvedCCW" : "curvedCW",
              roundness,
            };
          }

          const pageSuffix = r.page !== null && r.page !== undefined ? ` (p. ${r.page})` : "";
          const title = (multiDoc ? `[${r.docId}] ` : "") + (r.context || r.relation || "") + pageSuffix;

          edges.push({
            id: r.edgeId,
            from: r.fromId,
            to: r.toId,
            label: r.relation || "",
            title,
            arrows: "to",
            color: { color: "#4a5266", highlight: "#5b9fd4" },
            font: {
              color: "#c5cad6",
              size: 11,
              align: "middle",
              strokeWidth: 2,
              strokeColor: "#0e1015",
              vadjust: n > 1 ? Math.round((idx - (n - 1) / 2) * 4) : 0,
            },
            smooth,
            docId: r.docId,
          });
        });
      }

      return { nodes, edges };
    }

    function varAccent() {
      return getComputedStyle(document.documentElement)
        .getPropertyValue("--accent")
        .trim() || "#5b9fd4";
    }

    function drawGraph(nodes, edges) {
      graphEl.classList.remove("empty");
      graphEl.innerHTML = "";

      if (!nodes.length) {
        graphEl.classList.add("empty");
        graphEl.textContent = loadedDocs.size
          ? "No entities or relationships to show for the loaded file(s)."
          : "Drop an extraction JSON here, or use Load JSON…";
        if (network) {
          network.destroy();
          network = null;
        }
        return;
      }

      const dataset = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges),
      };

      const options = {
        nodes: {
          scaling: { min: 12, max: 40 },
          font: {
            color: "#ffffff",
            strokeWidth: 3,
            strokeColor: "#6b7280",
          },
        },
        edges: {
          width: 1.5,
          selectionWidth: 2.5,
        },
        physics: {
          enabled: true,
          solver: "forceAtlas2Based",
          forceAtlas2Based: {
            gravitationalConstant: -45,
            centralGravity: 0.01,
            springLength: 150,
            springConstant: 0.06,
            avoidOverlap: 0.8,
          },
          stabilization: { iterations: 120 },
        },
        interaction: {
          hover: true,
          tooltipDelay: 120,
          navigationButtons: false,
          keyboard: false,
        },
      };

      if (network) {
        network.destroy();
        network = null;
      }

      network = new vis.Network(graphEl, dataset, options);
      network.on("click", (params) => {
        if (params.nodes.length) showNode(params.nodes[0]);
      });
    }

    function showNode(id) {
      const meta = nodeMeta[id];
      if (!meta) return;

      const multiDoc = loadedDocs.size > 1;
      const rels = resolvedEdges.filter((r) => r.fromId === id || r.toId === id);

      let html =
        `<div class="label">Entity</div>` +
        `<div class="name">${escapeHtml(meta.name)}</div>` +
        `<span class="tag" style="background:${TYPE_COLORS[meta.type] || TYPE_COLORS.OTHER}33;color:${TYPE_COLORS[meta.type] || TYPE_COLORS.OTHER}">${escapeHtml(meta.type)}</span>`;

      if (meta.mentions && meta.mentions.length) {
        html += `<div class="label">Mentions</div><ul>`;
        for (const m of meta.mentions) {
          html += `<li>${escapeHtml(m.text)}</li>`;
        }
        html += `</ul>`;
      }

      if (multiDoc && meta.isGroup && meta.members.length) {
        html += `<div class="label" style="margin-top:0.75rem">Appears in</div><ul>`;
        for (const m of meta.members) {
          const color = (loadedDocs.get(m.docId) || {}).color || "#8b93a7";
          html += `<li><span class="dot" style="background:${color}"></span> <strong>${escapeHtml(m.docId)}</strong>: ${escapeHtml(m.localName)} <em>(${escapeHtml(m.localType)})</em></li>`;
        }
        html += `</ul>`;
      }

      if (rels.length) {
        html += `<div class="label" style="margin-top:0.75rem">Connections</div><ul>`;
        for (const r of rels) {
          const otherId = r.fromId === id ? r.toId : r.fromId;
          const otherName = (nodeMeta[otherId] || {}).name || otherId;
          const arrow = r.fromId === id ? `→ ${escapeHtml(otherName)}` : `← ${escapeHtml(otherName)}`;
          const docTag = multiDoc
            ? `<span class="doc-tag" style="background:${(loadedDocs.get(r.docId) || {}).color || "#8b93a7"}">${escapeHtml(r.docId)}</span> `
            : "";
          const pageLabel = r.page !== null && r.page !== undefined
            ? `<span class="page-tag">p. ${escapeHtml(String(r.page))}</span>`
            : "";
          html += `<li>${docTag}<em>${escapeHtml(r.relation || "")}</em> ${arrow}`;
          if (r.context || pageLabel) {
            const contextText = r.context ? escapeHtml(r.context) : "";
            const sep = contextText && pageLabel ? ", " : "";
            html += `<br/><span style="opacity:0.75">${contextText}${sep}${pageLabel}</span>`;
          }
          html += `</li>`;
        }
        html += `</ul>`;
      }

      selectionEl.className = "";
      selectionEl.innerHTML = html;
    }

    function renderSidePanel() {
      selectionEl.className = "placeholder";
      selectionEl.textContent = "Click a node in the graph";
    }

    function renderFileList() {
      fileListEl.innerHTML = "";

      for (const [docId, doc] of loadedDocs) {
        const li = document.createElement("li");
        li.className = "file-item";

        const dot = document.createElement("span");
        dot.className = "dot";
        dot.style.background = doc.color;

        const label = document.createElement("span");
        label.className = "file-item-label";
        label.textContent = `${docId} (${(doc.data.entities || []).length} entities)`;

        const removeBtn = document.createElement("button");
        removeBtn.className = "remove-btn";
        removeBtn.textContent = "×";
        removeBtn.title = "Remove";
        removeBtn.addEventListener("click", () => removeDoc(docId));

        li.appendChild(dot);
        li.appendChild(label);
        li.appendChild(removeBtn);
        fileListEl.appendChild(li);
      }

      if (linksData) {
        const li = document.createElement("li");
        li.className = "file-item";

        const dot = document.createElement("span");
        dot.className = "dot links-dot";

        const counts = [];
        if ((linksData.ambiguous_local_matches || []).length) counts.push(`${linksData.ambiguous_local_matches.length} ambiguous`);
        if ((linksData.skipped_files || []).length) counts.push(`${linksData.skipped_files.length} skipped`);

        const label = document.createElement("span");
        label.className = "file-item-label";
        label.textContent = linksFileName + (counts.length ? ` (${counts.join(", ")})` : "");

        const removeBtn = document.createElement("button");
        removeBtn.className = "remove-btn";
        removeBtn.textContent = "×";
        removeBtn.title = "Remove";
        removeBtn.addEventListener("click", () => removeLinks());

        li.appendChild(dot);
        li.appendChild(label);
        li.appendChild(removeBtn);
        fileListEl.appendChild(li);
      }

      fileIssues.forEach((issue, index) => {
        const li = document.createElement("li");
        li.className = "file-item issue";

        const label = document.createElement("span");
        label.className = "file-item-label";
        label.textContent = `${issue.fileName}: ${issue.message}`;

        const removeBtn = document.createElement("button");
        removeBtn.className = "remove-btn";
        removeBtn.textContent = "×";
        removeBtn.title = "Dismiss";
        removeBtn.addEventListener("click", () => removeIssue(index));

        li.appendChild(label);
        li.appendChild(removeBtn);
        fileListEl.appendChild(li);
      });

      if (!loadedDocs.size && !linksData && !fileIssues.length) {
        fileListEl.innerHTML = '<li class="placeholder">No files loaded</li>';
      }

      clearAllBtn.hidden = !(loadedDocs.size || linksData || fileIssues.length);

      const lines = [];
      if (loadNotices.length) lines.push(...loadNotices);
      if (unresolvedGroups.length) {
        const shown = unresolvedGroups
          .slice(0, 5)
          .map((u) => `${u.group.representative_name} (missing: ${u.missing.join(", ")})`);
        let text = `${unresolvedGroups.length} link group(s) pending — ${shown.join("; ")}`;
        if (unresolvedGroups.length > 5) text += `; +${unresolvedGroups.length - 5} more`;
        lines.push(text);
      }
      if (linksNoOverlap) {
        lines.push(`Links file covers ${(linksData.documents || []).length} document(s); none currently loaded.`);
      }

      fileNotesEl.innerHTML = "";
      if (lines.length) {
        fileNotesEl.hidden = false;
        for (const line of lines) {
          const div = document.createElement("div");
          div.textContent = line;
          fileNotesEl.appendChild(div);
        }
      } else {
        fileNotesEl.hidden = true;
      }
    }

    function updateHeaderFilename() {
      if (!loadedDocs.size && !linksData) {
        filenameEl.textContent = "Choose files from output/, plus optionally output/cross_document_links.json";
        return;
      }
      let text = `${loadedDocs.size} document${loadedDocs.size === 1 ? "" : "s"}`;
      if (linksData) text += " + links";
      text += " loaded";
      filenameEl.textContent = text;
    }

    function updateStatus(nodeCount, edgeCount) {
      const parts = [`${nodeCount} nodes`, `${edgeCount} edges`];
      if (loadedDocs.size > 1) {
        parts.push(`${loadedDocs.size} documents`);
        if (linksData) parts.push(`${resolvedGroups.size} merged`);
        if (unresolvedGroups.length) parts.push(`${unresolvedGroups.length} links pending`);
      }
      if (fileIssues.length) parts.push(`${fileIssues.length} failed to load`);
      setStatus(parts.join(" · "), fileIssues.length > 0);
    }

    function refresh() {
      recomputeGroups();
      const { nodes, edges } = buildGraph();
      renderFileList();
      renderSidePanel();
      updateHeaderFilename();
      drawGraph(nodes, edges);
      updateStatus(nodes.length, edges.length);
    }

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleFiles(fileInput.files);
      fileInput.value = "";
    });

    clearAllBtn.addEventListener("click", clearAll);

    ["dragenter", "dragover"].forEach((evt) => {
      graphEl.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        graphEl.style.outline = "1px dashed " + varAccent();
      });
    });
    ["dragleave", "drop"].forEach((evt) => {
      graphEl.addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        graphEl.style.outline = "";
      });
    });
    graphEl.addEventListener("drop", (e) => {
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });

    buildLegend();
  </script>
</body>
</html>
